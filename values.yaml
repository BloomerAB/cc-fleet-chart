# Claude Platform Helm Chart - Default Values

# -- Session Manager (API + WebSocket + SPA + SDK execution)
sessionManager:
  image:
    repository: ghcr.io/bloomerab/claude-session-manager
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Anthropic API Key (required)
anthropic:
  apiKey: ""

# -- GitHub OAuth App (required for login + git access)
github:
  clientId: ""
  clientSecret: ""
  scopes: "read:user,repo"

# -- JWT secret for session tokens (auto-generated if empty)
jwtSecret: ""

# -- ScyllaDB connection
scylla:
  host: scylla-client.scylla.svc.cluster.local
  port: 9042
  datacenter: datacenter1
  keyspace: claude_platform
  username: ""
  password: ""

# -- Task execution
tasks:
  maxConcurrent: 5
  workspaceDir: /tmp/claude-workspaces

# -- Repo allowlist (empty = all repos allowed)
# Example: ["github.com/MyOrg/*", "github.com/other-org/specific-repo"]
allowedRepos: []

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  host: claude.example.com
  tls:
    enabled: false
    secretName: claude-platform-tls
  annotations: {}

# -- Traefik IngressRoute (alternative to ingress)
ingressRoute:
  enabled: false
  host: claude.example.com
  tls:
    enabled: true
    secretName: claude-platform-tls
    certIssuer: letsencrypt-prod

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- CORS origin (defaults to https://<ingress.host>)
corsOrigin: ""
