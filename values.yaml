# CC Fleet Helm Chart

# -- Session Manager (API + WebSocket + SDK execution)
sessionManager:
  image:
    repository: ghcr.io/bloomerab/cc-fleet-manager
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

# -- Web Dashboard
ui:
  image:
    repository: ghcr.io/bloomerab/cc-fleet-ui
    tag: ""
    pullPolicy: IfNotPresent

# -- Authentication mode: "apiKey" uses ANTHROPIC_API_KEY, "subscription" uses claude auth login
authMode: apiKey

# -- Anthropic API Key (optional — users can set their own in Settings)
anthropic:
  apiKey: ""

# -- Claude credentials persistence (required for authMode: subscription)
claudeCredentials:
  enabled: false
  size: 100Mi
  storageClass: ""

# -- GitHub OAuth App (required for login + git access)
github:
  clientId: ""
  clientSecret: ""
  scopes: "read:user,repo"

# -- JWT secret for session tokens (auto-generated if empty)
jwtSecret: ""

# -- Built-in ScyllaDB (single-node, for simple installs)
scylla:
  # -- Deploy ScyllaDB as part of this chart
  enabled: true
  image: scylladb/scylla:6.2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
  persistence:
    size: 10Gi
    storageClass: ""
  # -- Connection settings (used by session manager)
  # When scylla.enabled=true, host is auto-set to the internal service
  # When scylla.enabled=false, set host to your external ScyllaDB
  host: ""
  port: 9042
  datacenter: datacenter1
  keyspace: cc_fleet
  username: ""
  password: ""

# -- Task execution
tasks:
  maxConcurrent: 5
  workspaceDir: /tmp/cc-fleet-workspaces

# -- Repo allowlist (empty = all repos allowed)
# Example: ["github.com/MyOrg/*", "github.com/other-org/specific-repo"]
allowedRepos: []

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  host: fleet.example.com
  tls:
    enabled: false
    secretName: cc-fleet-tls
  annotations: {}

# -- Traefik IngressRoute (alternative to ingress)
ingressRoute:
  enabled: false
  host: fleet.example.com
  tls:
    enabled: true
    secretName: cc-fleet-tls
    certIssuer: letsencrypt-prod

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- CORS origin (defaults to https://<ingress.host>)
corsOrigin: ""
