apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "claude-platform.fullname" . }}-session-manager
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
    {{- include "claude-platform.sessionManager.selectorLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "claude-platform.fullname" . }}-job-manager
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "claude-platform.fullname" . }}-job-manager
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "claude-platform.fullname" . }}-session-manager
roleRef:
  kind: Role
  name: {{ include "claude-platform.fullname" . }}-job-manager
  apiGroup: rbac.authorization.k8s.io
