{{- if .Values.claudeCredentials.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cc-fleet.fullname" . }}-claude-credentials
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.claudeCredentials.size }}
  {{- if .Values.claudeCredentials.storageClass }}
  storageClassName: {{ .Values.claudeCredentials.storageClass }}
  {{- end }}
{{- end }}
