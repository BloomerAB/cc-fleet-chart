{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cc-fleet.fullname" . }}
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cc-fleet.fullname" . }}-session-manager
                port:
                  number: 3000
{{- end }}
---
{{- if .Values.ingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "cc-fleet.fullname" . }}
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "cc-fleet.fullname" . }}-session-manager
          port: 3000
  {{- if .Values.ingressRoute.tls.enabled }}
  tls:
    secretName: {{ .Values.ingressRoute.tls.secretName }}
    domains:
      - main: {{ .Values.ingressRoute.host }}
  {{- end }}
---
{{- if and .Values.ingressRoute.tls.enabled .Values.ingressRoute.tls.certIssuer }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cc-fleet.fullname" . }}
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingressRoute.tls.secretName }}
  issuerRef:
    name: {{ .Values.ingressRoute.tls.certIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingressRoute.host }}
{{- end }}
{{- end }}
