apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cc-fleet.fullname" . }}-config
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
data:
  PORT: "3000"
  HOST: "0.0.0.0"
  SCYLLA_HOST: {{ include "cc-fleet.scyllaHost" . | quote }}
  SCYLLA_PORT: {{ .Values.scylla.port | quote }}
  SCYLLA_DATACENTER: {{ .Values.scylla.datacenter | quote }}
  SCYLLA_KEYSPACE: {{ .Values.scylla.keyspace | quote }}
  {{- if .Values.scylla.username }}
  SCYLLA_USERNAME: {{ .Values.scylla.username | quote }}
  {{- end }}
  GITHUB_SCOPES: {{ .Values.github.scopes | quote }}
  MAX_CONCURRENT_TASKS: {{ .Values.tasks.maxConcurrent | quote }}
  WORKSPACE_BASE_DIR: {{ .Values.tasks.workspaceDir | quote }}
  {{- if .Values.allowedRepos }}
  ALLOWED_REPOS: {{ join "," .Values.allowedRepos | quote }}
  {{- end }}
  CORS_ORIGIN: {{ include "cc-fleet.corsOrigin" . | quote }}
  AUTH_MODE: {{ .Values.authMode | quote }}
