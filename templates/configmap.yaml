apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-platform.fullname" . }}-config
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
data:
  PORT: "3000"
  HOST: "0.0.0.0"
  SCYLLA_HOST: {{ .Values.scylla.host | quote }}
  SCYLLA_PORT: {{ .Values.scylla.port | quote }}
  SCYLLA_DATACENTER: {{ .Values.scylla.datacenter | quote }}
  SCYLLA_KEYSPACE: {{ .Values.scylla.keyspace | quote }}
  {{- if .Values.scylla.username }}
  SCYLLA_USERNAME: {{ .Values.scylla.username | quote }}
  {{- end }}
  RUNNER_IMAGE: "{{ .Values.agentRunner.image.repository }}:{{ .Values.agentRunner.image.tag }}"
  RUNNER_NAMESPACE: {{ .Release.Namespace | quote }}
  ANTHROPIC_SECRET_NAME: {{ .Values.anthropic.secretName | quote }}
  ANTHROPIC_SECRET_KEY: {{ .Values.anthropic.secretKey | quote }}
  CORS_ORIGIN: {{ include "claude-platform.corsOrigin" . | quote }}
