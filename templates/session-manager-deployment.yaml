apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-platform.fullname" . }}-session-manager
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
    {{- include "claude-platform.sessionManager.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.sessionManager.replicas }}
  selector:
    matchLabels:
      {{- include "claude-platform.sessionManager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "claude-platform.labels" . | nindent 8 }}
        {{- include "claude-platform.sessionManager.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "claude-platform.fullname" . }}-session-manager
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: session-manager
          image: "{{ .Values.sessionManager.image.repository }}:{{ .Values.sessionManager.image.tag }}"
          imagePullPolicy: {{ .Values.sessionManager.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "claude-platform.fullname" . }}-config
            - secretRef:
                name: {{ include "claude-platform.fullname" . }}-secrets
          {{- if .Values.scylla.password }}
          env:
            - name: SCYLLA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "claude-platform.fullname" . }}-secrets
                  key: SCYLLA_PASSWORD
                  optional: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.sessionManager.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
