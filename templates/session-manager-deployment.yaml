apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cc-fleet.fullname" . }}-session-manager
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
    {{- include "cc-fleet.sessionManager.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.sessionManager.replicas }}
  selector:
    matchLabels:
      {{- include "cc-fleet.sessionManager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cc-fleet.labels" . | nindent 8 }}
        {{- include "cc-fleet.sessionManager.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: session-manager
          image: "{{ .Values.sessionManager.image.repository }}:{{ .Values.sessionManager.image.tag }}"
          imagePullPolicy: {{ .Values.sessionManager.image.pullPolicy }}
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cc-fleet.fullname" . }}-config
            - secretRef:
                name: {{ include "cc-fleet.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if .Values.claudeCredentials.enabled }}
          volumeMounts:
            - name: claude-credentials
              mountPath: /home/appuser/.claude
          {{- end }}
          resources:
            {{- toYaml .Values.sessionManager.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      {{- if .Values.claudeCredentials.enabled }}
      volumes:
        - name: claude-credentials
          persistentVolumeClaim:
            claimName: {{ include "cc-fleet.fullname" . }}-claude-credentials
      {{- end }}
