{{- if or .Values.github.clientId .Values.jwtSecret .Values.githubApp.appId }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-platform.fullname" . }}-secrets
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.jwtSecret }}
  JWT_SECRET: {{ .Values.jwtSecret | quote }}
  {{- else }}
  JWT_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if .Values.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.github.clientId | quote }}
  {{- end }}
  {{- if .Values.github.clientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.githubApp.appId }}
  GITHUB_APP_ID: {{ .Values.githubApp.appId | quote }}
  {{- end }}
  {{- if .Values.githubApp.privateKey }}
  GITHUB_APP_PRIVATE_KEY: {{ .Values.githubApp.privateKey | quote }}
  {{- end }}
  {{- if .Values.githubApp.installationId }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.githubApp.installationId | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.anthropic.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.anthropic.secretName }}
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.anthropic.secretKey }}: {{ .Values.anthropic.apiKey | quote }}
{{- end }}
