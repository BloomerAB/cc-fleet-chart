{{- $secretName := printf "%s-secrets" (include "cc-fleet.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "cc-fleet.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.jwtSecret }}
  JWT_SECRET: {{ .Values.jwtSecret | quote }}
  {{- else if and $existingSecret $existingSecret.data (index $existingSecret.data "JWT_SECRET") }}
  JWT_SECRET: {{ index $existingSecret.data "JWT_SECRET" | b64dec | quote }}
  {{- else }}
  JWT_SECRET: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if .Values.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.github.clientId | quote }}
  {{- end }}
  {{- if .Values.github.clientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.anthropic.apiKey }}
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | quote }}
  {{- end }}
  {{- if .Values.scylla.password }}
  SCYLLA_PASSWORD: {{ .Values.scylla.password | quote }}
  {{- end }}
