apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-platform.fullname" . }}-dashboard
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
    {{- include "claude-platform.dashboard.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "claude-platform.dashboard.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
