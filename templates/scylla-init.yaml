{{- if .Values.scylla.initSchema }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-platform.fullname" . }}-scylla-schema
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
data:
  schema.cql: |
    CREATE KEYSPACE IF NOT EXISTS {{ .Values.scylla.keyspace }}
    WITH replication = {
      'class': 'SimpleStrategy',
      'replication_factor': {{ .Values.scylla.replicationFactor }}
    };

    USE {{ .Values.scylla.keyspace }};

    CREATE TABLE IF NOT EXISTS sessions (
      user_id TEXT,
      id UUID,
      user_login TEXT,
      status TEXT,
      prompt TEXT,
      repo_url TEXT,
      repo_branch TEXT,
      max_turns INT,
      max_budget_usd FLOAT,
      deadline_seconds INT,
      job_name TEXT,
      result TEXT,
      created_at TIMESTAMP,
      updated_at TIMESTAMP,
      started_at TIMESTAMP,
      completed_at TIMESTAMP,
      PRIMARY KEY ((user_id), created_at, id)
    ) WITH CLUSTERING ORDER BY (created_at DESC, id ASC);

    CREATE INDEX IF NOT EXISTS sessions_by_id ON sessions (id);

    CREATE TABLE IF NOT EXISTS session_messages (
      session_id UUID,
      id UUID,
      role TEXT,
      content TEXT,
      tool_name TEXT,
      created_at TIMESTAMP,
      PRIMARY KEY ((session_id), created_at, id)
    ) WITH CLUSTERING ORDER BY (created_at ASC, id ASC);
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "claude-platform.fullname" . }}-scylla-init
  labels:
    {{- include "claude-platform.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-schema
          image: scylladb/scylla:6.2
          command:
            - sh
            - -c
            - |
              until cqlsh {{ .Values.scylla.host }} -e "SELECT now() FROM system.local"; do
                echo "Waiting for ScyllaDB..."
                sleep 5
              done
              cqlsh {{ .Values.scylla.host }} -f /schema/schema.cql
          volumeMounts:
            - name: schema
              mountPath: /schema
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: schema
          configMap:
            name: {{ include "claude-platform.fullname" . }}-scylla-schema
{{- end }}
